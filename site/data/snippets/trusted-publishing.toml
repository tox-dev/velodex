[auth]
signing_key_file = "/run/secrets/peryx-signing-key"
token_ttl_secs = 300
oidc_audience = "https://packages.example/_/oidc"

[[auth.trusted_publisher]]
id = "peryx-github-release"
issuer = "https://token.actions.githubusercontent.com"
repository = "root-pypi"
subject = "repo:tox-dev/peryx:*"
projects = ["peryx"]

[auth.trusted_publisher.claims]
repository_id = "123456789"
repository_owner_id = "9876543"
job_workflow_ref = "tox-dev/peryx/.github/workflows/release.yml@refs/heads/main"
event_name = "release"

[[index]]
name = "hosted"
hosted = true

[[index]]
name = "root-pypi"
route = "root/pypi"
layers = ["hosted"]
upload = "hosted"
