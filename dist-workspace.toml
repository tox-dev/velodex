[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Path that installers should place binaries in
install-path = ["$XDG_BIN_HOME/", "$XDG_DATA_HOME/../bin", "~/.local/bin"]
# Features to pass to cargo build
features = ["self-update"]
# Whether to install an updater program
install-updater = false
# Which actions to run on pull requests
pr-run-mode = "plan"
# The generated workflow carries local formatting (prettier); do not fail freshness checks
allow-dirty = ["ci"]
# Publish jobs to run in CI
publish-jobs = ["./publish-pypi"]

# aws-lc-sys (via the self-update feature's HTTP stack) needs a native C toolchain, so aarch64
# Linux builds on an arm runner instead of cross-compiling.
[dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"

[dist.github-action-commits]
"actions/checkout" = "34e114876b0b11c390a56381ad16ebd13914f8d5" # v4
"actions/upload-artifact" = "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
