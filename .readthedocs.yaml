# Read the Docs builds the Zola site with generic build commands and serves the output.
# READTHEDOCS_CANONICAL_URL carries the version-aware base URL (e.g. .../en/latest/), so links
# stay correct across versions and PR previews.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - curl -sL "https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz"
      | tar xz
    - ./zola --root site build --base-url "${READTHEDOCS_CANONICAL_URL}" --output-dir "${READTHEDOCS_OUTPUT}/html"
      --force
    - curl -sL "https://github.com/CloudCannon/pagefind/releases/download/v1.3.0/pagefind-v1.3.0-x86_64-unknown-linux-musl.tar.gz"
      | tar xz
    - ./pagefind --site "${READTHEDOCS_OUTPUT}/html" --include-characters "_-./"
    - python site/scripts/gen_llms.py --base-url "${READTHEDOCS_CANONICAL_URL}" --content site/content
      --out "${READTHEDOCS_OUTPUT}/html/llms.txt"
