# Vendored third-party artwork stays byte-for-byte as published.
exclude: ^site/static/logos/

ci:
  autoupdate_schedule: monthly
  # pre-commit.ci has neither a Rust toolchain nor a headless browser; CI runs fmt/clippy, and the docs
  # job re-inlines the committed diagrams (a missing partial fails there).
  skip: [cargo-fmt, cargo-clippy, render-diagrams]

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all --check --
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --workspace --all-targets -- -D warnings
        types: [rust]
        pass_filenames: false
      # Mermaid diagrams render to committed SVG partials because the docs host has no browser. Editing a
      # diagram's source changes its content-hash, so this re-renders and stages the partial on commit.
      - id: render-diagrams
        name: render mermaid diagrams
        language: system
        entry: npm --prefix site run render
        files: ^site/content/.*\.md$
        pass_filenames: false
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm>=1
          - mdformat-gfm-alerts>=2
          - mdformat-footnote>=0.1.3
          - mdformat-deflist>=0.1.4
          - mdformat-simple-breaks>=0.1
          - mdformat-toc>=0.5
          - mdformat-config>=0.2.1
          - mdformat-web>=0.2
          - mdformat-rustfmt>=0.0.3
          - mdformat-zola>=1
        args: ["--wrap", "120"]
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["--ignore-words-list=ser,unparseable"]
        # Generated mermaid SVGs contain mermaid's own class names (e.g. `.composit`).
        exclude: "^site/diagrams/"
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
