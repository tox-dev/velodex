name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Path-based gating so a PR that only touches one ecosystem benches just that leg. bench_matrix is
  # the dynamic `operations` matrix: both legs on non-PR events, otherwise only the affected ones.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      bench_matrix: ${{ steps.matrix.outputs.include }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            shared:
              - 'crates/peryx-core/**'
              - 'crates/peryx-storage/**'
              - 'crates/peryx-http/**'
              - 'crates/peryx-driver/**'
              - 'crates/peryx-identity/**'
              - 'crates/peryx-policy/**'
              - 'crates/peryx-index/**'
              - 'crates/peryx-events/**'
              - 'crates/peryx-upstream/**'
              - 'crates/peryx-search/**'
              - 'crates/peryx-replication/**'
              - 'crates/peryx/**'
              - 'crates/peryx-bench/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain*'
              - '.github/workflows/**'
            pypi:
              - 'crates/peryx-ecosystem-pypi/**'
            oci:
              - 'crates/peryx-ecosystem-oci/**'
      - id: matrix
        env:
          EVENT: ${{ github.event_name }}
          SHARED: ${{ steps.filter.outputs.shared }}
          OCI: ${{ steps.filter.outputs.oci }}
          PYPI: ${{ steps.filter.outputs.pypi }}
        run: |
          # Two concurrent PyPI fat-LTO links exceed the standard ARM runner's memory, so PyPI links
          # single-threaded.
          oci='{"ecosystem":"OCI","package":"peryx-ecosystem-oci","cargo_jobs":2}'
          pypi='{"ecosystem":"PyPI","package":"peryx-ecosystem-pypi","cargo_jobs":1}'
          legs=()
          if [ "$EVENT" != "pull_request" ]; then
            legs=("$oci" "$pypi")
          else
            if [ "$OCI" = "true" ] || [ "$SHARED" = "true" ]; then legs+=("$oci"); fi
            if [ "$PYPI" = "true" ] || [ "$SHARED" = "true" ]; then legs+=("$pypi"); fi
          fi
          IFS=,
          echo "include=[${legs[*]}]" >> "$GITHUB_OUTPUT"

  base:
    name: Base benchmark
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.bench_matrix != '[]'
    concurrency:
      group: codspeed-base-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for benchmark
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          while true; do
            run=$(
              gh run list \
                --workflow codspeed.yml \
                --branch main \
                --event push \
                --commit "$BASE_SHA" \
                --limit 1 \
                --json conclusion,status \
                --jq '.[0] | [.status, .conclusion] | @tsv'
            )
            case "$run" in
              $'completed\tsuccess') break ;;
              $'completed\t'*) echo "Base CodSpeed run failed: $run"; exit 1 ;;
            esac
            sleep 15
          done

  operations:
    name: ${{ matrix.ecosystem }} operation benchmarks
    needs: [changes, base]
    if: always() && (needs.base.result == 'success' || needs.base.result == 'skipped') && needs.changes.outputs.bench_matrix != '[]'
    concurrency:
      # GitHub left ARM jobs running after workflow-level cancellation in #280.
      group: codspeed-${{ matrix.ecosystem }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.bench_matrix) }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      # GitHub hands out heterogeneous ARM CPUs for ubuntu-24.04-arm. glibc then picks CPU-specific
      # memcpy/memset/malloc paths per runner, so cachegrind (simulation mode) measures the same
      # benchmark differently and reports phantom regressions on unrelated benchmarks. Forcing the
      # generic aarch64 code path and a single malloc arena makes the measurement CPU-independent.
      # See CodSpeed's write-up on runner CPU variance (codspeed.io/blog/why-glibc-faster-github-actions).
      GLIBC_TUNABLES: glibc.cpu.name=generic:glibc.malloc.arena_max=1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-codspeed@5.0.1
      - run: cargo codspeed build --locked -j ${{ matrix.cargo_jobs }} -m simulation -p ${{ matrix.package }}
      - name: Record benchmark hashes
        run: sha256sum target/codspeed/analysis/${{ matrix.package }}/*
      # CodSpeedHQ/action installs its valgrind .deb plus libc6-dbg via apt-get, fetched from
      # ports.ubuntu.com on ARM. That install runs inside the action, so only apt's own retry
      # config can harden it; pre-fetching libc6-dbg shrinks what the action must still download.
      - name: Make apt resilient to mirror blips
        run: |
          echo 'Acquire::Retries "5";' | sudo tee /etc/apt/apt.conf.d/80-retries
          for attempt in 1 2 3 4 5; do
            sudo apt-get update && sudo apt-get install -y libc6-dbg && exit 0
            echo "apt attempt $attempt failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "libc6-dbg install failed after 5 attempts"
          exit 1
      - uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: simulation
          run: cargo codspeed run

  # Required-status-check anchor: branch protection requires this job, not base/operations, because a
  # skipped required check blocks merge on GitHub. Passes when every dependency succeeded or skipped;
  # fails if any failed or was cancelled.
  codspeed-gate:
    if: always()
    needs: [changes, base, operations]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify no required job failed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "dependency results: $RESULTS"
          for result in $RESULTS; do
            case "$result" in
              failure|cancelled) echo "a required job reported: $result"; exit 1 ;;
            esac
          done
          echo "all required jobs passed or were skipped"
