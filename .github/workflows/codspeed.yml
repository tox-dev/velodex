name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  # Never cancel a main run: it records the baseline every PR is compared against. Cancelling it (as a
  # burst of merges does) leaves commits with no measurements, so CodSpeed falls back to an older base
  # taken in a different runtime environment and reports phantom regressions.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  operations:
    name: Driver operation benchmarks
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-codspeed
      - run: cargo codspeed build -m simulation -p peryx-ecosystem-pypi -p peryx-ecosystem-oci --bench operations
      - uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: simulation
          run: cargo codspeed run
