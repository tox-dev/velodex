name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-based gating so a PR that only touches one ecosystem benches just that leg. bench_matrix is
  # the dynamic `operations` matrix: both legs on non-PR events, otherwise only the affected ones.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      bench_matrix: ${{ steps.matrix.outputs.include }}
      workflow_changed: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            shared:
              - 'crates/peryx-core/**'
              - 'crates/peryx-storage/**'
              - 'crates/peryx-http/**'
              - 'crates/peryx-driver/**'
              - 'crates/peryx-identity/**'
              - 'crates/peryx-policy/**'
              - 'crates/peryx-index/**'
              - 'crates/peryx-events/**'
              - 'crates/peryx-upstream/**'
              - 'crates/peryx-search/**'
              - 'crates/peryx-replication/**'
              - 'crates/peryx/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain*'
            runner:
              - '.github/codspeed/**'
              - '.github/workflows/codspeed.yml'
              - 'ci/run-codspeed*.sh'
            workflow:
              - '.github/workflows/codspeed.yml'
            pypi:
              - 'crates/peryx-ecosystem-pypi/**'
            oci:
              - 'crates/peryx-ecosystem-oci/**'
      - id: matrix
        env:
          EVENT: ${{ github.event_name }}
          RUNNER: ${{ steps.filter.outputs.runner }}
          SHARED: ${{ steps.filter.outputs.shared }}
          OCI: ${{ steps.filter.outputs.oci }}
          PYPI: ${{ steps.filter.outputs.pypi }}
        run: |
          # thin LTO (set on the operations job) keeps the link within the standard ARM runner's
          # memory, so both ecosystems build in parallel.
          oci='{"ecosystem":"OCI","package":"peryx-ecosystem-oci","cargo_jobs":2}'
          pypi='{"ecosystem":"PyPI","package":"peryx-ecosystem-pypi","cargo_jobs":2}'
          legs=()
          if [ "$EVENT" != "pull_request" ]; then
            legs=("$oci" "$pypi")
          elif [ "$SHARED" = "true" ]; then
            legs=("$oci" "$pypi")
          else
            if [ "$OCI" = "true" ]; then legs+=("$oci"); fi
            if [ "$PYPI" = "true" ]; then legs+=("$pypi"); fi
            if [ ${#legs[@]} -eq 0 ] && [ "$RUNNER" = "true" ]; then legs+=("$pypi"); fi
          fi
          IFS=,
          echo "include=[${legs[*]}]" >> "$GITHUB_OUTPUT"

  base:
    name: Base benchmark
    needs: changes
    # A workflow repair cannot have a successful base run using its new workflow. Its operation jobs
    # still validate the benchmark path before merge; the next main run becomes the new baseline.
    if: >-
      github.event_name == 'pull_request' &&
      needs.changes.outputs.bench_matrix != '[]' &&
      needs.changes.outputs.workflow_changed != 'true'
    concurrency:
      group: codspeed-base-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for benchmark
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          while true; do
            run=$(
              gh run list \
                --workflow codspeed.yml \
                --branch main \
                --event push \
                --commit "$BASE_SHA" \
                --limit 1 \
                --json conclusion,status \
                --jq '.[0] | [.status, .conclusion] | @tsv'
            )
            case "$run" in
              $'completed\tsuccess') break ;;
              $'completed\t'*) echo "Base CodSpeed run failed: $run"; exit 1 ;;
            esac
            sleep 15
          done

  codspeed-image:
    name: CodSpeed runtime image
    needs: changes
    if: needs.changes.outputs.bench_matrix != '[]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      available: ${{ steps.image.outputs.available }}
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Resolve immutable runtime image
        id: image
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/peryx-codspeed
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          definition=$(sha256sum .github/codspeed/Dockerfile | cut -d ' ' -f 1)
          tag="$IMAGE:definition-$definition"
          digest=$(docker buildx imagetools inspect "$tag" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
          if [[ "$digest" == sha256:* ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "image=$IMAGE@$digest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT" == pull_request ]] && git cat-file -e "$BASE_SHA:.github/codspeed/Dockerfile"; then
            base_definition=$(git show "$BASE_SHA:.github/codspeed/Dockerfile" | sha256sum | cut -d ' ' -f 1)
            if [[ "$definition" == "$base_definition" ]]; then
              echo "The runtime image for this reviewed definition is unavailable."
              exit 1
            fi
          fi

          build=(
            docker buildx build
            --file .github/codspeed/Dockerfile
            --platform linux/arm64
            --tag "$tag"
            --label "org.opencontainers.image.revision=$GITHUB_SHA"
          )
          if [[ "$EVENT" == pull_request ]]; then
            "${build[@]}" --load .
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          "${build[@]}" --provenance=mode=max --sbom=true --push .
          for attempt in {1..5}; do
            digest=$(docker buildx imagetools inspect "$tag" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            [[ "$digest" == sha256:* ]] && break
            sleep $((attempt * 2))
          done
          [[ "$digest" == sha256:* ]]
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE@$digest" >> "$GITHUB_OUTPUT"

  operations:
    name: ${{ matrix.ecosystem }} operation benchmarks
    needs: [changes, base, codspeed-image]
    if: >-
      always() &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      needs.codspeed-image.result == 'success' &&
      needs.codspeed-image.outputs.available == 'true' &&
      needs.changes.outputs.bench_matrix != '[]'
    concurrency:
      # GitHub left ARM jobs running after workflow-level cancellation in #280.
      group: codspeed-${{ matrix.ecosystem }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.bench_matrix) }}
    runs-on: ubuntu-24.04-arm
    container:
      image: ${{ needs.codspeed-image.outputs.image }} # zizmor: ignore[unpinned-images] output is digest-pinned
      # CodSpeed's Valgrind runner uses setarch; Docker's default seccomp profile blocks personality.
      options: --security-opt seccomp=unconfined
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      packages: read
    env:
      # GitHub hands out heterogeneous ARM CPUs for ubuntu-24.04-arm. glibc then picks CPU-specific
      # memcpy/memset/malloc paths per runner, so cachegrind (simulation mode) measures the same
      # benchmark differently and reports phantom regressions on unrelated benchmarks. Forcing the
      # generic aarch64 code path and a single malloc arena makes the measurement CPU-independent.
      # See CodSpeed's write-up on runner CPU variance (codspeed.io/blog/why-glibc-faster-github-actions).
      GLIBC_TUNABLES: glibc.cpu.name=generic:glibc.malloc.arena_max=1
      # cargo codspeed builds with the release profile, whose fat LTO does a serial, memory-heavy,
      # uncacheable whole-program link (~20 min, and the reason PyPI was pinned to -j 1). Override to
      # thin LTO for the benchmark build only, so it parallelises, fits memory, and caches
      # incrementally. Production and dist builds keep fat LTO; only relative measurement matters here.
      CARGO_PROFILE_RELEASE_LTO: thin
      # A workflow repair validates the runner but cannot compare against results from the old runtime.
      CODSPEED_SKIP_UPLOAD: >-
        ${{ github.event_name == 'pull_request' && needs.changes.outputs.workflow_changed == 'true' }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: codspeed-v2
          cache-bin: false
          cache-on-failure: true
          cache-workspace-crates: true
      - run: ci/run-codspeed.sh ${{ matrix.package }} ${{ matrix.cargo_jobs }}

  # Required-status-check anchor: branch protection requires this job, not base/operations, because a
  # skipped required check blocks merge on GitHub. Passes when every dependency succeeded or skipped;
  # fails if any failed or was cancelled.
  codspeed-gate:
    if: always()
    needs: [changes, base, codspeed-image, operations]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify no required job failed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "dependency results: $RESULTS"
          for result in $RESULTS; do
            case "$result" in
              failure|cancelled) echo "a required job reported: $result"; exit 1 ;;
            esac
          done
          echo "all required jobs passed or were skipped"
