name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  # Never cancel a main run: it records the baseline every PR is compared against. Cancelling it (as a
  # burst of merges does) leaves commits with no measurements, so CodSpeed falls back to an older base
  # taken in a different runtime environment and reports phantom regressions.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  base:
    name: Base benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for benchmark
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          while true; do
            run=$(
              gh run list \
                --workflow codspeed.yml \
                --branch main \
                --event push \
                --commit "$BASE_SHA" \
                --limit 1 \
                --json conclusion,status \
                --jq '.[0] | [.status, .conclusion] | @tsv'
            )
            case "$run" in
              $'completed\tsuccess') break ;;
              $'completed\t'*) echo "Base CodSpeed run failed: $run"; exit 1 ;;
            esac
            sleep 15
          done

  operations:
    name: Driver operation benchmarks
    needs: base
    if: always() && (needs.base.result == 'success' || needs.base.result == 'skipped')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-codspeed@5.0.1
      - run: cargo codspeed build --locked -j 2 -m simulation -p peryx-ecosystem-pypi -p peryx-ecosystem-oci
      - name: Record benchmark hashes
        run: sha256sum target/codspeed/analysis/peryx-ecosystem-{oci,pypi}/*
      - uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: simulation
          run: cargo codspeed run
