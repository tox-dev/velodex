name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Run component benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC auth with CodSpeed; no token secret needed on a public repo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-codspeed
      # The component benchmarks are the instrumented subset of the suite; the wall-clock server
      # comparison in the same crate cannot run under the simulation instrument.
      - run: cargo codspeed build -p velodex-bench
      - uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4
        with:
          mode: simulation
          run: cargo codspeed run
