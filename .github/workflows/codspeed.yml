name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  base:
    name: Base benchmark
    if: github.event_name == 'pull_request'
    concurrency:
      group: codspeed-base-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for benchmark
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          while true; do
            run=$(
              gh run list \
                --workflow codspeed.yml \
                --branch main \
                --event push \
                --commit "$BASE_SHA" \
                --limit 1 \
                --json conclusion,status \
                --jq '.[0] | [.status, .conclusion] | @tsv'
            )
            case "$run" in
              $'completed\tsuccess') break ;;
              $'completed\t'*) echo "Base CodSpeed run failed: $run"; exit 1 ;;
            esac
            sleep 15
          done

  operations:
    name: ${{ matrix.ecosystem }} operation benchmarks
    needs: base
    if: always() && (needs.base.result == 'success' || needs.base.result == 'skipped')
    concurrency:
      # GitHub left ARM jobs running after workflow-level cancellation in #280.
      group: codspeed-${{ matrix.ecosystem }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - ecosystem: OCI
            package: peryx-ecosystem-oci
          - ecosystem: PyPI
            package: peryx-ecosystem-pypi
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-codspeed@5.0.1
      - run: cargo codspeed build --locked -j 2 -m simulation -p ${{ matrix.package }}
      - name: Record benchmark hashes
        run: sha256sum target/codspeed/analysis/${{ matrix.package }}/*
      - uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          mode: simulation
          run: cargo codspeed run
