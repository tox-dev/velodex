name: OCI conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

env:
  # The opencontainers/distribution-spec commit whose conformance suite velodex is tested against.
  DISTRIBUTION_SPEC_REF: fcfba1ec55526073f48b2f6d4e3d7eef410ddcbc

jobs:
  conformance:
    name: distribution-spec conformance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - name: Build velodex
        run: cargo build --release --bin velodex
      - name: Build the conformance suite
        # ubuntu-24.04 ships a recent Go; the suite builds with any 1.22+.
        run: |
          git clone https://github.com/opencontainers/distribution-spec "$RUNNER_TEMP/distribution-spec"
          git -C "$RUNNER_TEMP/distribution-spec" checkout "$DISTRIBUTION_SPEC_REF"
          cd "$RUNNER_TEMP/distribution-spec/conformance"
          go test -c -o "$RUNNER_TEMP/conformance.test"
      - name: Run conformance against velodex
        run: ci/run-oci-conformance.sh ./target/release/velodex "$RUNNER_TEMP/conformance.test"
