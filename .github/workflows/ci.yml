name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  TWINE_VERSION: "6.2.0"
  UV_VERSION: "0.11.29"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  # Path-based gating lets pull requests run only affected jobs. Pushes, schedules, and manual runs
  # exercise the complete suite.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      rust: ${{ steps.filter.outputs.shared == 'true' || steps.filter.outputs.pypi == 'true' || steps.filter.outputs.oci == 'true' || steps.filter.outputs.web == 'true' }}
      shared: ${{ steps.filter.outputs.shared }}
      pypi: ${{ steps.filter.outputs.pypi }}
      frontend_tests: ${{ steps.filter.outputs.frontend_tests }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            shared:
              - 'crates/peryx-core/**'
              - 'crates/peryx-storage/**'
              - 'crates/peryx-http/**'
              - 'crates/peryx-driver/**'
              - 'crates/peryx-identity/**'
              - 'crates/peryx-policy/**'
              - 'crates/peryx-index/**'
              - 'crates/peryx-events/**'
              - 'crates/peryx-upstream/**'
              - 'crates/peryx-search/**'
              - 'crates/peryx-replication/**'
              - 'crates/peryx/**'
              - 'crates/peryx-bench/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain*'
              - '.github/workflows/ci.yml'
            pypi:
              - 'crates/peryx-ecosystem-pypi/**'
            oci:
              - 'crates/peryx-ecosystem-oci/**'
            web:
              - 'crates/peryx-web/**'
            frontend_tests:
              - 'tests/frontend/**'
            docs:
              - 'site/**'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' || github.event_name == 'push' ||
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # One build+test job per platform, uniform across the matrix. sccache (shared with local dev) plus
  # the workspace target cache keep the Windows compile — the reason this leg was once split into a
  # build-once plus sharded-run workaround — down to a single job like the others. A failure fails the
  # matrix fast: `fail-fast` cancels the sibling platforms and nextest stops at the first failing test.
  test:
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' || github.event_name == 'push' ||
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            features: --all-features
          - os: macos-26
            features: ""
          - os: windows-2025
            features: ""
    runs-on: ${{ matrix.os }}
    # Homebrew (pulled in by taiki-e/install-action on macOS) warns about the runner's pre-installed
    # aws/tap unless tap-trust checks are disabled.
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache: false
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: test
          add-rust-environment-hash-key: false
          cache-on-failure: true
          cache-workspace-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace ${{ matrix.features }} -E 'not(binary(e2e))'

  coverage:
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' || github.event_name == 'push' ||
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-llvm-cov,cargo-nextest
      # LCOV DA records aggregate source-line hits across test binaries. LLVM's line total counts
      # uncovered generic instantiations separately, so it can regress when dependency edges change.
      # Functions remain LLVM-gated. main.rs is the entrypoint shell; peryx-web is the UI, whose
      # browser-event closures only execute as wasm. peryx's UI tests assert server rendering;
      # Playwright asserts browser interactivity.
      - run: .github/scripts/test-check-lcov-lines
      - run: >
          cargo llvm-cov nextest --workspace --ignore-filename-regex '(main\.rs|crates/peryx-web/|crates/peryx-bench/)' --fail-under-functions 100 --lcov --output-path lcov.info
      - run: .github/scripts/check-lcov-lines.awk lcov.info
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Hermetic end-to-end: real pip/uv drive a spawned peryx that proxies a local fixture index, so no
  # external network is touched. Proves downstream clients work through peryx on every PR.
  e2e:
    needs: changes
    if: >-
      needs.changes.outputs.pypi == 'true' || needs.changes.outputs.shared == 'true' ||
      github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-nextest
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          cache-dependency-glob: .github/workflows/ci.yml
          version: ${{ env.UV_VERSION }}
      - run: uv tool install twine==${TWINE_VERSION}
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build e2e tests
        run: cargo build -p peryx --features e2e --tests
      - name: Run e2e tests
        run: cargo nextest run -p peryx --features e2e

  # The same client flows against the real pypi.org, to catch upstream drift.
  e2e-live:
    needs: changes
    if: >-
      needs.changes.outputs.pypi == 'true' || needs.changes.outputs.shared == 'true' ||
      github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-nextest
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          cache-dependency-glob: .github/workflows/ci.yml
          version: ${{ env.UV_VERSION }}
      - run: uv tool install twine==${TWINE_VERSION}
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build e2e tests
        run: cargo build -p peryx --features e2e-live --tests
      - name: Run live e2e tests
        run: cargo nextest run -p peryx --features e2e-live -E 'test(e2e_live)'

  # The hydrated web UI, driven by Playwright: the wasm bundle is built with cargo-leptos and the
  # suite exercises search, the project page, the archive browser, and token-authenticated actions.
  frontend:
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend_tests == 'true' ||
      github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    env:
      CARGO_LEPTOS_VERSION: "0.3.6"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
          target: wasm32-unknown-unknown
      - name: Install cargo-leptos
        run: |
          curl -sL "https://github.com/leptos-rs/cargo-leptos/releases/download/v${CARGO_LEPTOS_VERSION}/cargo-leptos-x86_64-unknown-linux-musl.tar.gz" | tar xz --strip-components=1
          sudo mv cargo-leptos /usr/local/bin/
      - run: cargo leptos build
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/frontend/package-lock.json
      - run: npm ci
        working-directory: tests/frontend
      - run: npx playwright install --with-deps chromium
        working-directory: tests/frontend
      - run: npx playwright test
        working-directory: tests/frontend

  # Mermaid diagrams are pre-rendered from source to committed dual-theme SVG partials (site/diagrams,
  # keyed by a hash of the diagram source) because the docs host has no headless browser. This job
  # builds the site and inlines those partials; inline_diagrams.py fails when a source's partial is
  # missing, so a changed diagram that was not re-rendered is caught here. Regenerate with
  # `npm --prefix site run render` (a git pre-commit hook does this automatically) and commit the result.
  docs:
    needs: changes
    if: >-
      needs.changes.outputs.docs == 'true' || github.event_name == 'push' ||
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install zola
        run: |
          curl -sL "https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/
      - run: zola --root site build
      - run: python3 site/scripts/inline_diagrams.py site/public

  # Required-status-check anchor: branch protection requires this job, not the conditional ones above,
  # because a skipped required check blocks merge on GitHub. Passes when every dependency succeeded or
  # skipped; fails if any failed or was cancelled.
  ci-gate:
    if: always()
    needs: [changes, lint, test, coverage, e2e, e2e-live, frontend, docs]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify no required job failed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "dependency results: $RESULTS"
          for result in $RESULTS; do
            case "$result" in
              failure|cancelled) echo "a required job reported: $result"; exit 1 ;;
            esac
          done
          echo "all required jobs passed or were skipped"
