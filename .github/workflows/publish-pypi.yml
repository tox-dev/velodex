# Build and publish the velodex wheels: one `bindings = "bin"` wheel per platform (the compiled
# binary as a console script, no Python ABI coupling) plus the sdist. Invoked by the dist-generated
# release pipeline; a manual dispatch builds everything but skips the publish.
name: publish-pypi
on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  workflow_dispatch:

permissions: {}

jobs:
  wheels:
    name: wheel ${{ matrix.platform.os }}-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: linux, runner: ubuntu-24.04, target: x86_64, manylinux: "2_28" }
          - { os: linux, runner: ubuntu-24.04-arm, target: aarch64, manylinux: "2_28" }
          - { os: linux, runner: ubuntu-24.04, target: x86_64-unknown-linux-musl, manylinux: musllinux_1_2 }
          - { os: linux, runner: ubuntu-24.04, target: aarch64-unknown-linux-musl, manylinux: musllinux_1_2, zig: true }
          - { os: macos, runner: macos-15, target: aarch64 }
          - { os: macos, runner: macos-15, target: x86_64 }
          - { os: windows, runner: windows-2025, target: x64 }
          - { os: windows, runner: windows-11-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --locked --out dist ${{ matrix.platform.zig && '--zig' || '' }}
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          sccache: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist
          if-no-files-found: error

  sdist:
    name: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-sdist
          path: dist
          if-no-files-found: error

  publish:
    name: publish to PyPI
    if: ${{ github.event_name != 'workflow_dispatch' }}
    needs: [wheels, sdist]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      # PyPI trusted publishing (OIDC); no long-lived token exists
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
