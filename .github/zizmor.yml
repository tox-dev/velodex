# release.yml is generated by dist (`dist generate`); its shape is not ours to harden. It needs
# `contents: write` to create GitHub releases, its template expansions come from dist itself, and
# `secrets: inherit` is how dist hands credentials to the custom publish job.
rules:
  excessive-permissions:
    ignore:
      - release.yml
  template-injection:
    ignore:
      - release.yml
  unpinned-images:
    ignore:
      - release.yml
  secrets-inherit:
    ignore:
      - release.yml
